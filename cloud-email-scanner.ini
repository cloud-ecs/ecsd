
docroot = html

[spool]
dir = spool

[listen]
port = 8000


[clamav]
; default, try each interface and discover installed scanners
; interface = socket | cli | network
; timeout = 30

; defaults shown, uncomment to customize
; socket = /var/run/clamav.sock

[clamav.net]
; host = 0.0.0.0
; port = 3310

[clamav.cli]
; bin = clamdscan
; args =

[spamassassin]
; interface = socket | cli | network
; timeout = 30
; socket = /var/run/spamd/spamd.socket

[spamassassin.net]
; host = 0.0.0.0
; port = 783

[spamassassin.cli]
; bin = spamc
; args =

[rspamd]
; interface = network | cli

[rspamd.net]
; host = 0.0.0.0
; port = 11333

[rspamd.cli]
; bin = rspamc
; args =

[virustotal]
; cloud API; requires a key (or set VIRUSTOTAL_API_KEY in the environment).
; Scanning an unknown file uploads it to virustotal.com for analysis.
; apikey =
; timeout = 30

[avg]
; interface = network | cli

[avg.net]
; host = 0.0.0.0
; port = 54322

[avg.cli]
; bin = avgscan

[esets]
; interface = cli

[esets.cli]
; bin = esets_cli
; args =

[dcc]
; interface = socket | network
; timeout = 30
; dccifd listener socket (DCC home dir default)
; socket = /var/dcc/dccifd

[dcc.net]
; dccifd has no standard TCP port; point this at your daemon
; host = 0.0.0.0
; port = 1025

[kaspersky]

[opendkim]
; interface = cli

[opendkim.cli]
; bin = opendkim
; args = -t

[maildmarc]
; Mail::DMARC HTTP service (mail-dmarc-httpd); interface = network
; timeout = 30

[maildmarc.net]
; host = 0.0.0.0
; port = 8080

[dspam]
; interface = cli | socket | network
; cli = dspam
; socket = /tmp/dspam.sock

[dspam.net]
; host = 0.0.0.0
; port = 24

[dspam.cli]
; bin = dspam
; args = --mode=tum --process --deliver=summary --stdout <
