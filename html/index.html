<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/img/favicon.ico" />
    <title>Email Content Scanning Daemon</title>
    <link href="/css/ecsd.css" rel="stylesheet" />
  </head>

  <body>
    <nav class="navbar" id="navbar"></nav>

    <main>
      <h1>Email Content Scanning Daemon</h1>
      <p>
        A web service that receives email over HTTP and scans it with one or
        many filtering engines — antivirus, antispam, and policy engines.
      </p>
      <p>
        <a href="/scan.html">Scan a message</a> or check the
        <a href="/status.html">engine status</a>.
      </p>
    </main>

    <script>
      fetch('/navbar.html')
        .then((r) => r.text())
        .then((html) => {
          document.getElementById('navbar').innerHTML = html
        })
    </script>
  </body>
</html>
