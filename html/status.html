<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/img/favicon.ico" />
    <title>Status — Email Content Scanning Daemon</title>
    <link href="/css/ecsd.css" rel="stylesheet" />
  </head>

  <body>
    <nav class="navbar" id="navbar"></nav>

    <main>
      <h1>Engine status</h1>
      <table>
        <thead>
          <tr>
            <th>Scanner</th>
            <th>Interface</th>
          </tr>
        </thead>
        <tbody id="status"></tbody>
      </table>
    </main>

    <script>
      fetch('/navbar.html')
        .then((r) => r.text())
        .then((html) => {
          document.getElementById('navbar').innerHTML = html
        })

      async function loadStatus() {
        const all = (await (await fetch('/status/scannersAll')).json()).scanners
        const avail = (await (await fetch('/status/scannersAvailable')).json())
          .scanners

        const tbody = document.getElementById('status')
        for (const name of all) {
          const iface = avail[name] && avail[name].available.any
          const row = document.createElement('tr')
          row.innerHTML =
            `<td>${name}</td>` +
            `<td class="${iface ? 'pass' : 'fail'}">${iface || 'n/a'}</td>`
          tbody.appendChild(row)
        }
      }

      loadStatus()
    </script>
  </body>
</html>
