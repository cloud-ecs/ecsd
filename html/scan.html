<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/img/favicon.ico" />
    <title>Scan — Email Content Scanning Daemon</title>
    <link href="/css/ecsd.css" rel="stylesheet" />
  </head>

  <body>
    <nav class="navbar" id="navbar"></nav>

    <main>
      <h1>Scan a message</h1>
      <form
        id="scan"
        action="/scan"
        enctype="multipart/form-data"
        method="post"
      >
        <div class="field">
          <label for="upload">Message file (.eml)</label>
          <input type="file" id="upload" name="upload" required />
        </div>
        <button type="submit">Scan</button>
      </form>
      <pre id="results" hidden></pre>
    </main>

    <script>
      fetch('/navbar.html')
        .then((r) => r.text())
        .then((html) => {
          document.getElementById('navbar').innerHTML = html
        })

      const form = document.getElementById('scan')
      const results = document.getElementById('results')

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        const res = await fetch('/scan', {
          method: 'POST',
          body: new FormData(form),
        })
        results.hidden = false
        results.textContent = JSON.stringify(await res.json(), null, 2)
      })
    </script>
  </body>
</html>
